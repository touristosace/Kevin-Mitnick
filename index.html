<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Web Hack | اتصل بنا</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #020202; 
            color: #ffffff; 
            font-family: 'Cairo', sans-serif; 
            margin: 0;
        }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .bg-grid {
            background-image: linear-gradient(to right, #0f172a 1px, transparent 1px), 
                              linear-gradient(to bottom, #0f172a 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-grid min-h-screen">

    <nav class="bg-black/90 border-b border-blue-900/40 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-xl font-black text-blue-500 font-cyber">DARK WEB <span class="text-white">HACK</span></div>
            <ul class="flex space-x-reverse space-x-6 text-sm font-bold uppercase">
                <li><a href="index.html" class="hover:text-blue-400 transition">الرئيسية</a></li>
                <li><a href="about.html" class="hover:text-blue-400 transition">من نحن</a></li>
                <li><a href="work.html" class="hover:text-blue-400 transition">أعمالنا</a></li>
                <li><a href="contact.html" class="text-blue-400">اتصل بنا</a></li>
            </ul>
        </div>
    </nav>

    <section class="py-20 container mx-auto px-6">
        <div class="max-w-3xl mx-auto bg-zinc-950 border border-blue-900/50 p-10 shadow-2xl shadow-blue-900/10">
            <h2 class="text-3xl font-black mb-8 text-white font-cyber tracking-widest border-b border-blue-600 pb-4">
                إرسال إشارة مشفرة (Contact Us)
            </h2>
            <form class="grid md:grid-cols-2 gap-6">
                <div class="flex flex-col">
                    <label class="text-blue-400 text-xs font-cyber mb-2 uppercase">USER_ID</label>
                    <input type="text" placeholder="اسمك الكريم" class="bg-zinc-900 border border-zinc-800 p-3 rounded-sm text-white focus:border-blue-500 outline-none">
                </div>
                <div class="flex flex-col">
                    <label class="text-blue-400 text-xs font-cyber mb-2 uppercase">SECURE_EMAIL</label>
                    <input type="email" placeholder="بريدك الإلكتروني" class="bg-zinc-900 border border-zinc-800 p-3 rounded-sm text-white focus:border-blue-500 outline-none font-cyber">
                </div>
                <div class="md:col-span-2 flex flex-col">
                    <label class="text-blue-400 text-xs font-cyber mb-2 uppercase">ENCRYPTED_MESSAGE</label>
                    <textarea rows="4" placeholder="اكتب رسالتك هنا..." class="bg-zinc-900 border border-zinc-800 p-3 rounded-sm text-white focus:border-blue-500 outline-none"></textarea>
                </div>
                <button type="submit" class="md:col-span-2 bg-blue-600 hover:bg-blue-700 text-white font-black py-4 transition-all">
                    إرسال البيانات عبر النفق الآمن
                </button>
            </form>
        </div>

        <div class="mt-20 text-center">
            <h3 class="text-xl font-bold mb-6 text-zinc-500 font-cyber">SYSTEM_RATING_PROTOCOL</h3>
            <div class="flex justify-center gap-4 text-4xl text-zinc-800">
                <span class="cursor-pointer hover:text-blue-400 transition">★</span>
                <span class="cursor-pointer hover:text-blue-400 transition">★</span>
                <span class="cursor-pointer hover:text-blue-400 transition">★</span>
                <span class="cursor-pointer hover:text-blue-400 transition">★</span>
                <span class="cursor-pointer hover:text-blue-400 transition">★</span>
            </div>
        </div>
    </section>

</body>
</html>
