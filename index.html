<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Web Hack | الاختراق المظلم</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --dark-bg: #020202;
        }
        
        body { 
            background-color: var(--dark-bg); 
            color: #ffffff; 
            /* استخدام خط Cairo للعربي و Orbitron للإنجليزي */
            font-family: 'Cairo', 'Orbitron', sans-serif; 
        }

        .font-cyber { font-family: 'Orbitron', sans-serif; }

        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070');
            background-size: cover; 
            background-position: center;
        }

        /* تأثير التوهج للنصوص (Neon Glow) */
        .text-glow {
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.7), 0 0 20px rgba(0, 242, 254, 0.5);
        }

        .border-glow {
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 bg-black/90 border-b border-blue-900/50 p-4 backdrop-blur-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-2xl font-black text-blue-500 font-cyber tracking-tighter">DARK WEB <span class="text-white">HACK</span></div>
            
            <ul class="hidden md:flex space-x-reverse space-x-8 text-sm font-bold uppercase">
                <li><a href="#home" class="hover:text-blue-400 transition">الرئيسية</a></li>
                <li><a href="#about" class="hover:text-blue-400 transition">من نحن</a></li>
                <li><a href="#work" class="hover:text-blue-400 transition">أعمالنا</a></li>
                <li><a href="#contact" class="hover:text-blue-400 transition">اتصل بنا</a></li>
            </ul>
            
            <div class="flex gap-4">
                <button class="text-xs font-bold border border-blue-500 px-5 py-2 rounded hover:bg-blue-500 transition">تسجيل الدخول</button>
            </div>
        </div>
    </nav>

    <section id="home" class="hero-bg h-screen flex items-center justify-center text-center">
        <div class="px-4">
            <h1 class="text-6xl md:text-9xl font-black mb-6 tracking-tighter text-glow font-cyber italic">
                DARK WEB <span class="text-blue-500">HACK</span>
            </h1>
            <p class="text-gray-400 text-lg md:text-2xl max-w-3xl mx-auto font-bold mb-8">
                الدخول إلى أعماق الشبكة. حيث القوة، السيطرة، والخصوصية المطلقة.
            </p>
            <div class="flex justify-center gap-4">
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-full font-black text-lg transition-all transform hover:scale-105 border-glow">
                    ابدأ الاختراق الآن
                </button>
            </div>
        </div>
    </section>

    <section class="py-16 bg-black border-t border-blue-900/30">
        <div class="container mx-auto text-center">
            <h3 class="text-2xl font-black mb-6 text-blue-400">تقييم النظام</h3>
            <div class="flex justify-center gap-3 text-4xl text-gray-700">
                <span class="cursor-pointer hover:text-blue-400 transition duration-300">★</span>
                <span class="cursor-pointer hover:text-blue-400 transition duration-300">★</span>
                <span class="cursor-pointer hover:text-blue-400 transition duration-300">★</span>
                <span class="cursor-pointer hover:text-blue-400 transition duration-300">★</span>
                <span class="cursor-pointer hover:text-blue-400 transition duration-300">★</span>
            </div>
            <p class="mt-4 text-gray-500 text-sm">ساعدنا في تحسين بروتوكولاتنا</p>
        </div>
    </section>

</body>
</html>
