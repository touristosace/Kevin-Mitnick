<section id="contact" class="py-32 bg-zinc-950">
    <div class="container mx-auto px-6">
        <div class="max-w-4xl mx-auto bg-black border border-blue-900/50 p-10 rounded-lg shadow-2xl">
            <h2 class="text-3xl font-black mb-8 text-white font-cyber tracking-widest border-b border-blue-600 pb-4">
                إرسال إشارة مشفرة (Contact Us)
            </h2>
            <form class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-blue-400 text-xs font-cyber mb-2">USER_ID</label>
                    <input type="text" placeholder="اسمك الكريم" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-sm focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-blue-400 text-xs font-cyber mb-2">SECURE_EMAIL</label>
                    <input type="email" placeholder="بريدك الإلكتروني" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-sm focus:border-blue-500 outline-none transition">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-blue-400 text-xs font-cyber mb-2">ENCRYPTED_MESSAGE</label>
                    <textarea rows="4" placeholder="اكتب رسالتك هنا..." class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-sm focus:border-blue-500 outline-none transition"></textarea>
                </div>
                <button type="submit" class="md:col-span-2 bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-sm transition-all shadow-lg shadow-blue-900/20">
                    إرسال البيانات عبر النفق الآمن
                </button>
            </form>
        </div>
    </div>
</section>

<div id="authModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-md">
    <div class="bg-zinc-900 border-2 border-blue-600 p-8 w-full max-w-md relative">
        <button onclick="toggleAuth()" class="absolute top-4 left-4 text-gray-500 hover:text-white font-cyber">CLOSE [X]</button>
        
        <div id="loginForm">
            <h2 class="text-2xl font-black mb-6 text-white font-cyber">ACCESS_REQUIRED</h2>
            <input type="text" placeholder="اسم المستخدم" class="w-full bg-black border border-zinc-700 p-3 mb-4 rounded-sm text-blue-400 font-cyber">
            <input type="password" placeholder="كلمة المرور" class="w-full bg-black border border-zinc-700 p-3 mb-6 rounded-sm text-blue-400 font-cyber">
            <button class="w-full bg-blue-600 py-3 font-black hover:bg-blue-500 transition mb-4">LOG_IN</button>
            <p class="text-xs text-center text-gray-500">ليس لديك تصريح؟ <span onclick="switchForm()" class="text-blue-400 cursor-pointer">أنشئ حساباً جديداً</span></p>
        </div>

        <div id="signupForm" class="hidden">
            <h2 class="text-2xl font-black mb-6 text-white font-cyber">CREATE_IDENTITY</h2>
            <input type="text" placeholder="الاسم الكامل" class="w-full bg-black border border-zinc-700 p-3 mb-4 rounded-sm text-blue-400">
            <input type="email" placeholder="البريد الإلكتروني" class="w-full bg-black border border-zinc-700 p-3 mb-4 rounded-sm text-blue-400 font-cyber">
            <input type="password" placeholder="كلمة مرور قوية" class="w-full bg-black border border-zinc-700 p-3 mb-6 rounded-sm text-blue-400 font-cyber">
            <button class="w-full bg-green-600 py-3 font-black hover:bg-green-500 transition mb-4">REGISTER_NEW_NODE</button>
            <p class="text-xs text-center text-gray-500">لديك حساب بالفعل؟ <span onclick="switchForm()" class="text-blue-400 cursor-pointer">تسجيل الدخول</span></p>
        </div>
    </div>
</div>

<script>
    // وظائف بسيطة للتحكم بالنافذة المنبثقة
    function toggleAuth() {
        const modal = document.getElementById('authModal');
        modal.classList.toggle('hidden');
    }

    function switchForm() {
        document.getElementById('loginForm').classList.toggle('hidden');
        document.getElementById('signupForm').classList.toggle('hidden');
    }

    // ربط أزرار الـ Navbar بالدالة
    document.querySelectorAll('button').forEach(btn => {
        if(btn.innerText.includes('LOGIN') || btn.innerText.includes('دخول') || btn.innerText.includes('تسجيل')) {
            btn.onclick = toggleAuth;
        }
    });
</script>
